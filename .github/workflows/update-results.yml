name: Update results

on:
  schedule:
    # Every 15 minutes during the tournament window (Jun 11 – Jul 19 2026).
    # Offset minutes — GitHub deprioritises on-the-hour crons, which made
    # the job fire only sporadically.
    - cron: '7,22,37,52 * 11-30 6 *'
    - cron: '7,22,37,52 * 1-19 7 *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-results
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest results
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node scripts/fetch-results.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet data/results.json; then
            echo "No changes."
            exit 0
          fi
          git config user.name "results-bot"
          git config user.email "actions@github.com"
          git add data/results.json
          git commit -m "Auto-update results"
          git push
